# Actually Remote — Configuration Template
# ----------------------------------------
# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored and will never be committed.
# Only this example file is committed to the repo.

# --- AI Configuration ---
# Which AI provider to use for CV matching.
# Options: gemini, claude, openai, ollama
# Default: gemini (best free tier — 1,500 requests/day, no expiry)
ai_provider: gemini
ai_model: gemini-2.0-flash    # model to use for CV matching and discovery

# --- Job Matching Thresholds ---
# Fit score is 0-10. Jobs below the threshold are ignored.
# Priority companies use a slightly lower threshold (you care more about them).
min_fit_score: 7
priority_min_fit_score: 6

# --- Target Job Titles ---
# A job must contain at least one of these titles to be considered.
# Case-insensitive. Partial matches work (e.g. "Engineer" matches "Solutions Engineer").
target_titles:
  - "Software Engineer"
  - "Backend Engineer"
  - "Frontend Engineer"
  - "Full Stack Engineer"
  - "DevOps Engineer"
  - "Data Engineer"
  - "Product Manager"
  - "Designer"

# --- Location Keywords ---
# A job must match at least one of these to pass the location filter.
# This runs before AI — it's fast and free.
# Add your country, city, or region here.
location_keywords:
  - "Remote"
  - "EMEA"
  - "Europe"
  - "Global"
  - "Worldwide"

# --- Notifications ---
# List the channels you want to enable.
# Comment out any channel you don't want.
notification_channels:
  # - discord
  - email
  # - telegram

email:
  provider: resend       # options: resend, gmail (will be added later)
  send_if_no_matches: false  # set true if you want confirmation
                             # it ran even with no matches

discord:
  send_if_no_matches: false   # requires DISCORD_WEBHOOK_URL in .env

telegram:
  send_if_no_matches: false   # requires TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in .env

# --- Scheduling ---
# How many days between scrapes for non-priority companies.
# Default: 7 (each company checked once per week)
# Priority companies are always checked on every run.
rotation_days: 7